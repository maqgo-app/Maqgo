<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAQGO · Baseline (4041f3f)</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: #0b0f14; color: #e6edf3; }
      header { position: sticky; top: 0; background: rgba(11,15,20,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; z-index: 10; }
      header h1 { margin: 0; font-size: 14px; font-weight: 800; }
      header p { margin: 6px 0 0; font-size: 12px; opacity: 0.8; }
      .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; align-items: start; }
      .card { border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); }
      .card .title { padding: 10px 12px; font-size: 12px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .card img { display: block; width: 390px; max-width: 100%; height: auto; margin: 0 auto; }
      @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Baseline visual · 4041f3f</h1>
      <p>Capturas fullPage. Abre este HTML en el navegador para scrollear completo.</p>
    </header>
    <main class="wrap">
      <section class="card"><div class="title">Reserva confirmada</div><img src="1-reserva-confirmada.png" alt="Reserva confirmada" /></section>
      <section class="card"><div class="title">Operador asignado</div><img src="2-operador-asignado.png" alt="Operador asignado" /></section>
      <section class="card"><div class="title">Operador en ruta</div><img src="3-operador-en-ruta.png" alt="Operador en ruta" /></section>
      <section class="card"><div class="title">Finalizado</div><img src="4-finalizado.png" alt="Finalizado" /></section>
    </main>
  </body>
</html>
