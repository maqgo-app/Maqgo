<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAQGO · Pantalla 1</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; background: #0f0f10; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(15, 15, 16, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 10px 12px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .btn {
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.92);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        cursor: pointer;
        user-select: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .title { color: rgba(255,255,255,0.92); font-size: 13px; font-weight: 650; white-space: nowrap; }
      .spacer { flex: 1; }
      .hint { color: rgba(255,255,255,0.55); font-size: 12px; white-space: nowrap; }

      .grid {
        height: calc(100% - 56px);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
      }
      .panel {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        overflow: auto;
        position: relative;
      }
      .panelHeader {
        position: sticky;
        top: 0;
        background: rgba(15, 15, 16, 0.86);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 10px 12px;
        font-size: 12px;
        color: rgba(255,255,255,0.85);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .panelHeader small { color: rgba(255,255,255,0.55); }
      .imgWrap { padding: 12px; width: fit-content; }
      img {
        display: block;
        transform-origin: top left;
        transform: scale(var(--qa-scale, 1));
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      }

      input[type="range"] { width: 180px; }

      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="title">Pantalla 1 · Cliente · Selección de maquinaria</div>
      <div class="spacer"></div>
      <label class="hint" for="zoom">Zoom</label>
      <input id="zoom" type="range" min="0.5" max="2.0" step="0.05" value="1" />
      <button class="btn" id="zoomReset" type="button">100%</button>
      <div class="spacer"></div>
      <a class="btn" href="./flow-01-cliente-maquinaria.png" target="_blank" rel="noreferrer">Abrir arriba</a>
      <a class="btn" href="./flow-01b-cliente-maquinaria-bottom.png" target="_blank" rel="noreferrer">Abrir abajo</a>
    </div>

    <div class="grid">
      <div class="panel" id="left">
        <div class="panelHeader">
          Arriba <small>(se ven 8; faltan 2 abajo)</small>
        </div>
        <div class="imgWrap">
          <img src="./flow-01-cliente-maquinaria.png" alt="Pantalla 1 (arriba)" />
        </div>
      </div>

      <div class="panel" id="right">
        <div class="panelHeader">
          Abajo <small>(scroll al final; se ven las 10)</small>
        </div>
        <div class="imgWrap">
          <img src="./flow-01b-cliente-maquinaria-bottom.png" alt="Pantalla 1 (abajo)" />
        </div>
      </div>
    </div>

    <script>
      const zoom = document.getElementById('zoom');
      const reset = document.getElementById('zoomReset');
      const apply = () => {
        const v = Number(zoom.value);
        document.documentElement.style.setProperty('--qa-scale', String(v));
        reset.textContent = `${Math.round(v * 100)}%`;
      };
      zoom.addEventListener('input', apply);
      reset.addEventListener('click', () => {
        zoom.value = '1';
        apply();
      });
      apply();
    </script>
  </body>
</html>
