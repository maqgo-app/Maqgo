<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAQGO · QA Flow</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; background: #0f0f10; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(15, 15, 16, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 10px 12px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        background: #EC6819;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        cursor: pointer;
        user-select: none;
      }
      .btn.secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.92); }
      select {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        outline: none;
      }
      option { background: #141416; color: rgba(255,255,255,0.92); }
      .title { color: rgba(255,255,255,0.92); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .spacer { flex: 1; }
      .hint { color: rgba(255,255,255,0.55); font-size: 12px; white-space: nowrap; }
      .wrap { height: calc(100% - 56px); }
      .frameStage {
        height: 100%;
        width: 100%;
        overflow: auto;
        background: radial-gradient(1200px 800px at 30% 10%, rgba(236,104,25,0.10), transparent 60%);
      }
      .frameInner {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .overlay {
        position: absolute;
        inset: 0;
        background: transparent;
        cursor: grab;
        z-index: 5;
      }
      .overlay:active { cursor: grabbing; }
      iframe {
        width: calc(100% / var(--qa-scale, 1));
        height: calc(100% / var(--qa-scale, 1));
        border: 0;
        background: #0f0f10;
        transform: scale(var(--qa-scale, 1));
        transform-origin: top left;
      }
      body.qa-view-mode iframe { pointer-events: none; }
      .gate {
        max-width: 720px;
        margin: 90px auto;
        padding: 18px;
        border-radius: 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.88);
        line-height: 1.45;
      }
      .gate h1 { margin: 0 0 10px; font-size: 18px; }
      .gate code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div id="gate" class="gate" style="display:none">
      <h1>QA Flow</h1>
      <div>Para usar este visor agrega <code>?qa=1</code> al final de la URL.</div>
    </div>

    <div id="app" style="display:none">
      <div class="topbar">
        <button class="btn secondary" id="prev">←</button>
        <button class="btn secondary" id="next">→</button>
        <select id="screen"></select>
        <button class="btn secondary" id="zoomOut">−</button>
        <button class="btn secondary" id="zoomIn">+</button>
        <button class="btn secondary" id="zoomReset">100%</button>
        <button class="btn secondary" id="fitW">Ajustar ancho</button>
        <button class="btn secondary" id="fitH">Ajustar alto</button>
        <button class="btn secondary" id="toggleMode">Ver</button>
        <button class="btn secondary" id="reload">Recargar</button>
        <div class="spacer"></div>
        <div class="title" id="caption"></div>
        <div class="spacer"></div>
        <div class="hint">Pantallas reales en producción · scroll dentro</div>
      </div>
      <div class="wrap">
        <div class="frameStage" id="stage">
          <div class="frameInner" id="inner">
            <iframe id="frame" title="MAQGO QA" referrerpolicy="no-referrer"></iframe>
            <div class="overlay" id="overlay" aria-label="Visor QA"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const qs = new URLSearchParams(window.location.search);
      const qaEnabled = qs.get('qa') === '1';
      const gate = document.getElementById('gate');
      const app = document.getElementById('app');
      if (!qaEnabled) {
        gate.style.display = 'block';
      } else {
        app.style.display = 'block';
      }

      if (!qaEnabled) {
        throw new Error('QA disabled');
      }

      const SELECTED_ADDRESS_KEY = 'selectedAddress';
      const baseNowIso = () => new Date().toISOString();

      const setCommon = (role) => {
        localStorage.setItem('legalAcceptedAt', baseNowIso());
        localStorage.setItem('token', 'qa-token');
        localStorage.setItem('authToken', 'qa-token');
        localStorage.setItem('userRole', role);
      };

      const seedClient = () => {
        setCommon('client');
        localStorage.setItem('userId', 'client-qa-001');
        localStorage.setItem('reservationType', 'immediate');
        localStorage.setItem('priceType', 'hour');
        localStorage.setItem('oneclickDemoMode', 'true');
        localStorage.setItem('selectedMachinery', 'retroexcavadora');
        localStorage.setItem('selectedHours', '4');
        localStorage.setItem('serviceLat', '-33.4372');
        localStorage.setItem('serviceLng', '-70.6506');
        localStorage.setItem('serviceReference', 'Portón verde, acceso por el costado');
        const sa = {
          address_short: 'Av. Providencia 123',
          address_full: 'Av. Providencia 123, Providencia, Chile',
          street: 'Av. Providencia',
          number: '123',
          comuna: 'Providencia',
          commune: 'Providencia',
          source: 'manual',
          lat: -33.4372,
          lng: -70.6506,
        };
        localStorage.setItem(SELECTED_ADDRESS_KEY, JSON.stringify(sa));
        localStorage.setItem('serviceLocation', 'Av. Providencia 123, Providencia');
        localStorage.setItem('serviceComuna', 'Providencia');
        localStorage.setItem('serviceComunaSource', 'manual');
        localStorage.setItem('serviceLocationManualFallback', 'true');
      };

      const seedProvider = () => {
        setCommon('provider');
        localStorage.setItem('providerRole', 'super_master');
        localStorage.setItem('userId', 'provider-qa-001');
        const req = {
          id: 'req-qa-001',
          reservationType: 'immediate',
          machineryType: 'retroexcavadora',
          workDescription: 'Excavación básica',
          address: 'Av. Providencia 123, Providencia',
          basePrice: 80000,
          transportFee: 15000,
          offerTimeoutSeconds: 60,
          urgencyType: 'today',
          urgencyWindowMinutes: 120,
          client: { name: 'Cliente MAQGO' },
        };
        localStorage.setItem('incomingRequest', JSON.stringify(req));
      };

      const steps = [
        { key: 'c1', label: '1 · Cliente · Maquinaria', seed: seedClient, path: '/client/machinery' },
        { key: 'c2', label: '2 · Cliente · Ubicación', seed: seedClient, path: '/client/service-location' },
        { key: 'c3', label: '3 · Cliente · Proveedores', seed: seedClient, path: '/client/providers' },
        { key: 'c4', label: '4 · Cliente · Revisión', seed: seedClient, path: '/client/confirm' },
        { key: 'c5', label: '5 · Cliente · Buscando', seed: () => { seedClient(); }, path: '/client/searching' },
        { key: 'p1', label: '6 · Proveedor · Solicitud recibida', seed: seedProvider, path: '/provider/request-received' },
      ];

      const frame = document.getElementById('frame');
      const stage = document.getElementById('stage');
      const overlay = document.getElementById('overlay');
      const caption = document.getElementById('caption');
      const sel = document.getElementById('screen');
      const prev = document.getElementById('prev');
      const next = document.getElementById('next');
      const reload = document.getElementById('reload');
      const zoomIn = document.getElementById('zoomIn');
      const zoomOut = document.getElementById('zoomOut');
      const zoomReset = document.getElementById('zoomReset');
      const fitW = document.getElementById('fitW');
      const fitH = document.getElementById('fitH');
      const toggleMode = document.getElementById('toggleMode');

      let scale = 1;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const applyScale = () => {
        document.documentElement.style.setProperty('--qa-scale', String(scale));
        zoomReset.textContent = `${Math.round(scale * 100)}%`;
      };

      let viewMode = true;
      const applyMode = () => {
        document.body.classList.toggle('qa-view-mode', viewMode);
        toggleMode.textContent = viewMode ? 'Ver' : 'Interactuar';
        overlay.style.display = viewMode ? 'block' : 'none';
      };

      let idx = 0;
      const setStep = (i) => {
        idx = clamp(i, 0, steps.length - 1);
        const s = steps[idx];
        sel.value = s.key;
        caption.textContent = s.label;
        try { s.seed(); } catch { void 0; }
        frame.src = `${window.location.origin}${s.path}`;
        stage.scrollTop = 0;
        stage.scrollLeft = 0;
      };

      steps.forEach((s) => {
        const opt = document.createElement('option');
        opt.value = s.key;
        opt.textContent = s.label;
        sel.appendChild(opt);
      });

      sel.addEventListener('change', () => {
        const i = steps.findIndex((s) => s.key === sel.value);
        setStep(i >= 0 ? i : 0);
      });
      prev.addEventListener('click', () => setStep(idx - 1));
      next.addEventListener('click', () => setStep(idx + 1));
      reload.addEventListener('click', () => setStep(idx));

      zoomIn.addEventListener('click', () => {
        scale = clamp(Number((scale * 1.15).toFixed(4)), 0.25, 2.6);
        applyScale();
      });
      zoomOut.addEventListener('click', () => {
        scale = clamp(Number((scale / 1.15).toFixed(4)), 0.25, 2.6);
        applyScale();
      });
      zoomReset.addEventListener('click', () => {
        scale = 1;
        applyScale();
        stage.scrollTop = 0;
        stage.scrollLeft = 0;
      });

      const fitToWidth = () => {
        const targetWidth = 1440;
        const w = Math.max(320, stage.clientWidth);
        scale = clamp(Number((w / targetWidth).toFixed(4)), 0.25, 2.6);
        applyScale();
        stage.scrollTop = 0;
        stage.scrollLeft = 0;
      };
      const fitToHeight = () => {
        const targetHeight = 900;
        const h = Math.max(320, stage.clientHeight);
        scale = clamp(Number((h / targetHeight).toFixed(4)), 0.25, 2.6);
        applyScale();
        stage.scrollTop = 0;
        stage.scrollLeft = 0;
      };
      fitW.addEventListener('click', fitToWidth);
      fitH.addEventListener('click', fitToHeight);

      toggleMode.addEventListener('click', () => {
        viewMode = !viewMode;
        applyMode();
      });

      let dragging = false;
      let startX = 0;
      let startY = 0;
      let startScrollLeft = 0;
      let startScrollTop = 0;
      overlay.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startScrollLeft = stage.scrollLeft;
        startScrollTop = stage.scrollTop;
      });
      window.addEventListener('mouseup', () => { dragging = false; });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        stage.scrollLeft = startScrollLeft - dx;
        stage.scrollTop = startScrollTop - dy;
      });

      overlay.addEventListener(
        'wheel',
        (e) => {
          e.preventDefault();
          const direction = e.deltaY > 0 ? -1 : 1;
          const factor = direction > 0 ? 1.12 : 1 / 1.12;
          const nextScale = clamp(Number((scale * factor).toFixed(4)), 0.25, 2.6);
          if (nextScale === scale) return;

          const rect = overlay.getBoundingClientRect();
          const offsetX = e.clientX - rect.left;
          const offsetY = e.clientY - rect.top;
          const beforeX = (offsetX + stage.scrollLeft) / scale;
          const beforeY = (offsetY + stage.scrollTop) / scale;

          scale = nextScale;
          applyScale();

          requestAnimationFrame(() => {
            stage.scrollLeft = beforeX * scale - offsetX;
            stage.scrollTop = beforeY * scale - offsetY;
          });
        },
        { passive: false }
      );
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') setStep(idx - 1);
        if (e.key === 'ArrowRight') setStep(idx + 1);
      });

      applyScale();
      applyMode();
      setStep(0);
    </script>
  </body>
</html>
