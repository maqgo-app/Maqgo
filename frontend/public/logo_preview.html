<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Preview Logo MAQGO</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #1a1a1a; color: #fff; }
    h2 { margin: 24px 0 12px; font-size: 14px; color: #EC6819; }
    .preview { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; padding: 24px; border-radius: 12px; margin-bottom: 16px; }
    .preview.dark { background: #000; }
    .preview.light { background: #fff; color: #333; }
    .preview.orange { background: #EC6819; }
    .preview.blue { background: #90BDD3; }
    img { max-height: 120px; width: auto; }
  </style>
</head>
<body>
  <h1>Logo MAQGO - Vista previa</h1>
  <p>El logo con fondo transparente sobre diferentes fondos:</p>

  <h2>Fondo negro</h2>
  <div class="preview dark">
    <img src="maqgo_logo_clean.png" alt="MAQGO logo">
  </div>

  <h2>Fondo blanco</h2>
  <div class="preview light">
    <img src="maqgo_logo_clean.png" alt="MAQGO logo">
  </div>

  <h2>Fondo naranja MAQGO</h2>
  <div class="preview orange">
    <img src="maqgo_logo_clean.png" alt="MAQGO logo">
  </div>

  <h2>Fondo azul</h2>
  <div class="preview blue">
    <img src="maqgo_logo_clean.png" alt="MAQGO logo">
  </div>
</body>
</html>
