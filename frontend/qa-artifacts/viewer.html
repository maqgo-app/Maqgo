<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAQGO · Capturas</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; background: #0f0f10; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(15, 15, 16, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 10px 12px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .btn {
        background: #EC6819;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        cursor: pointer;
        user-select: none;
      }
      .btn.secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.92); }
      .title { color: rgba(255,255,255,0.92); font-size: 13px; margin-left: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .spacer { flex: 1; }
      .hint { color: rgba(255,255,255,0.55); font-size: 12px; white-space: nowrap; }
      .stage { height: calc(100% - 56px); }
      .viewport {
        height: 100%;
        width: 100%;
        overflow: auto;
        cursor: grab;
        background: radial-gradient(1200px 800px at 30% 10%, rgba(236,104,25,0.10), transparent 60%);
      }
      .viewport:active { cursor: grabbing; }
      .canvas {
        width: fit-content;
        height: fit-content;
        padding: 18px;
      }
      img {
        display: block;
        transform-origin: top left;
        image-rendering: auto;
        border-radius: 14px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      }
      select {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 650;
        outline: none;
      }
      option { background: #141416; color: rgba(255,255,255,0.92); }
      a { color: rgba(255,255,255,0.85); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <button class="btn secondary" id="prev">←</button>
      <button class="btn secondary" id="next">→</button>
      <select id="screen"></select>
      <button class="btn secondary" id="zoomOut">−</button>
      <button class="btn secondary" id="zoomIn">+</button>
      <button class="btn secondary" id="reset">Reset</button>
      <div class="spacer"></div>
      <div class="hint">Arrastra para mover · Rueda para zoom · ←/→ cambia</div>
    </div>

    <div class="stage">
      <div class="viewport" id="viewport">
        <div class="canvas">
          <img id="img" alt="Captura" />
          <div class="title" id="caption" style="margin-top:10px"></div>
          <div class="title" style="margin-top:6px; color: rgba(255,255,255,0.55)">
            Archivo: <a id="fileLink" href="#" target="_blank" rel="noreferrer">abrir</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const screens = [
        { key: 'flow-01', label: '1 · Cliente · Maquinaria', file: './out/flow-01-cliente-maquinaria-hd.png' },
        { key: 'flow-02', label: '2 · Cliente · Ubicación', file: './out/flow-02-cliente-ubicacion.png' },
        { key: 'flow-03', label: '3 · Cliente · Proveedores', file: './out/flow-03-cliente-proveedores.png' },
        { key: 'flow-04', label: '4 · Cliente · Selección', file: './out/flow-04-cliente-proveedores-seleccion.png' },
        { key: 'flow-05', label: '5 · Cliente · Revisión', file: './out/flow-05-cliente-confirmar.png' },
        { key: 'flow-06', label: '6 · Cliente · Siguiente paso', file: './out/flow-06-cliente-siguiente-paso.png' },
        { key: 'flow-07', label: '7 · Cliente · Buscando', file: './out/flow-07-cliente-buscando.png' },
        { key: 'flow-08', label: '8 · Proveedor · Solicitud recibida', file: './out/flow-08-proveedor-solicitud-recibida.png' },
      ];

      const viewport = document.getElementById('viewport');
      const img = document.getElementById('img');
      const caption = document.getElementById('caption');
      const fileLink = document.getElementById('fileLink');
      const sel = document.getElementById('screen');
      const prev = document.getElementById('prev');
      const next = document.getElementById('next');
      const zoomIn = document.getElementById('zoomIn');
      const zoomOut = document.getElementById('zoomOut');
      const reset = document.getElementById('reset');

      let index = 0;
      let scale = 1;

      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const applyScale = () => { img.style.transform = `scale(${scale})`; };
      const setScreen = (i, { center = true } = {}) => {
        index = clamp(i, 0, screens.length - 1);
        const s = screens[index];
        sel.value = s.key;
        img.src = s.file;
        caption.textContent = s.label;
        fileLink.href = s.file;
        if (center) {
          requestAnimationFrame(() => {
            viewport.scrollTop = 0;
            viewport.scrollLeft = 0;
          });
        }
      };

      screens.forEach((s) => {
        const opt = document.createElement('option');
        opt.value = s.key;
        opt.textContent = s.label;
        sel.appendChild(opt);
      });

      sel.addEventListener('change', () => {
        const i = screens.findIndex((s) => s.key === sel.value);
        setScreen(i >= 0 ? i : 0);
      });

      prev.addEventListener('click', () => setScreen(index - 1));
      next.addEventListener('click', () => setScreen(index + 1));

      zoomIn.addEventListener('click', () => {
        scale = clamp(Number((scale * 1.15).toFixed(4)), 0.4, 4);
        applyScale();
      });
      zoomOut.addEventListener('click', () => {
        scale = clamp(Number((scale / 1.15).toFixed(4)), 0.4, 4);
        applyScale();
      });
      reset.addEventListener('click', () => {
        scale = 1;
        applyScale();
        viewport.scrollTop = 0;
        viewport.scrollLeft = 0;
      });

      let dragging = false;
      let startX = 0;
      let startY = 0;
      let startScrollLeft = 0;
      let startScrollTop = 0;

      viewport.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startScrollLeft = viewport.scrollLeft;
        startScrollTop = viewport.scrollTop;
      });
      window.addEventListener('mouseup', () => { dragging = false; });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        viewport.scrollLeft = startScrollLeft - dx;
        viewport.scrollTop = startScrollTop - dy;
      });

      viewport.addEventListener('wheel', (e) => {
        if (!e.ctrlKey && Math.abs(e.deltaY) < 1) return;
        e.preventDefault();
        const direction = e.deltaY > 0 ? -1 : 1;
        const factor = direction > 0 ? 1.12 : 1 / 1.12;
        const nextScale = clamp(Number((scale * factor).toFixed(4)), 0.4, 4);
        if (nextScale === scale) return;

        const rect = img.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        const beforeX = (offsetX + viewport.scrollLeft) / scale;
        const beforeY = (offsetY + viewport.scrollTop) / scale;

        scale = nextScale;
        applyScale();

        requestAnimationFrame(() => {
          viewport.scrollLeft = beforeX * scale - offsetX;
          viewport.scrollTop = beforeY * scale - offsetY;
        });
      }, { passive: false });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') setScreen(index - 1);
        if (e.key === 'ArrowRight') setScreen(index + 1);
      });

      applyScale();
      setScreen(0);
    </script>
  </body>
</html>
