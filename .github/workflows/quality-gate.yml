name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo (opcional) para forzar deploy hooks"
        required: false
        default: ""

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      # Misma barra que release local: unit + guardrails prod (no demo UI) + build + verify dist
      - name: Frontend gate deploy
        run: npm run gate:deploy
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: E2E smoke (proveedor)
        env:
          PLAYWRIGHT_E2E_SKIP_BUILD: "true"
        run: npx playwright test qa-artifacts/smoke-provider-onboarding.spec.js

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt
      - name: Start backend for integration tests
        run: |
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 --app-dir backend >/tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/uvicorn.log
          exit 1
      - name: Run backend tests
        run: |
          REACT_APP_BACKEND_URL=http://127.0.0.1:8000 python -m pytest \
            tests/test_otp_service.py \
            tests/test_pricing_unit.py \
            tests/test_scenarios_simulation.py \
            tests/test_all_machinery_qa.py \
            -q --tb=short

  vercel_deploy:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: maqgo-deploy-main
      cancel-in-progress: true
    steps:
      - name: Trigger Vercel deploy hook (push main)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          echo "Deploy trigger: commit=$GITHUB_SHA ref=$GITHUB_REF event=$GITHUB_EVENT_NAME"
          DEPLOY_HOOK_URL="${VERCEL_DEPLOY_HOOK_URL:-$VERCEL_DEPLOY_HOOK}"
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL (or legacy VERCEL_DEPLOY_HOOK)."
            exit 1
          fi
          curl -fsS --retry 3 --retry-all-errors --max-time 30 "$DEPLOY_HOOK_URL"

  deploy_hooks_manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    concurrency:
      group: maqgo-deploy-main
      cancel-in-progress: true
    steps:
      - name: Trigger deploy hooks (manual)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          echo "Manual deploy trigger: commit=$GITHUB_SHA ref=$GITHUB_REF reason='${{ inputs.reason }}'"
          VERCEL_URL="${VERCEL_DEPLOY_HOOK_URL:-$VERCEL_DEPLOY_HOOK}"
          if [ -z "$VERCEL_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL (or legacy VERCEL_DEPLOY_HOOK)."
            exit 1
          fi
          curl -fsS --retry 3 --retry-all-errors --max-time 30 "$VERCEL_URL"
          if [ -n "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            curl -fsS --retry 3 --retry-all-errors --max-time 30 "$RAILWAY_DEPLOY_HOOK_URL"
          else
            echo "No RAILWAY_DEPLOY_HOOK_URL configured; skipping Railway hook."
          fi
