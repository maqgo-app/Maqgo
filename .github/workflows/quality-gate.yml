name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint frontend
        run: npm run lint
        continue-on-error: true
      - name: Test frontend
        run: npm run test:unit
      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt
      - name: Start backend for integration tests
        run: |
          nohup python -m uvicorn server:app --host 127.0.0.1 --port 8000 --app-dir backend >/tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/api/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/uvicorn.log
          exit 1
      - name: Run backend tests
        run: |
          REACT_APP_BACKEND_URL=http://127.0.0.1:8000 python -m pytest \
            tests/test_otp_service.py \
            tests/test_pricing_unit.py \
            tests/test_scenarios_simulation.py \
            tests/test_all_machinery_qa.py \
            -q --tb=short
